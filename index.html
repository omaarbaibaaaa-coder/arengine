<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Stereo Camera</title>

<style>
html,body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:black;
}

#container{
    display:flex;
    width:100vw;
    height:100vh;
}

.eye{
    width:50%;
    height:100%;
    object-fit:cover;
}

#start{
    position:absolute;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
    z-index:100;
    padding:12px 20px;
}
</style>
</head>
<body>

<div id="container">
    <video id="leftEye" class="eye" autoplay playsinline muted></video>
    <video id="rightEye" class="eye" autoplay playsinline muted></video>
</div>

<button id="start">Start Stereo Camera</button>

<script>

const leftEye = document.getElementById("leftEye");
const rightEye = document.getElementById("rightEye");

document.getElementById("start").onclick = async () => {

    try {

        const stream =
            await navigator.mediaDevices.getUserMedia({
                video:{
                    facingMode:"environment"
                }
            });

        leftEye.srcObject = stream;
        rightEye.srcObject = stream;

    } catch(err) {
        alert(err.message);
    }
};

</script>

</body>
</html>
