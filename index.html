<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice-Controlled VR Box AR Engine</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #000;
            font-family: sans-serif;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
        }
        #divider {
            position: absolute;
            left: 50%;
            top: 0;
            bottom: 0;
            width: 2px;
            background: rgba(255, 255, 255, 0.2);
            z-index: 10;
        }
        #hud-overlay {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #00ffcc;
            background: rgba(0,0,0,0.7);
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: bold;
            pointer-events: none;
            z-index: 10;
            text-align: center;
            border: 1px solid #00ffcc;
            box-shadow: 0 0 10px rgba(0,255,204,0.3);
        }
    </style>
</head>
<body>

    <div id="hud-overlay">🎤 Mic Active. Say: "Spawn Cube" | "Change Color" | "Clear Scene"</div>
    <div id="divider"></div>
    <div id="canvas-container"></div>

    <script type="module">
        import * as THREE from 'https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.module.js';

        class VoiceStereoAREngine {
            constructor() {
                this.container = document.getElementById('canvas-container');

                // 1. Dual Camera System for Stereoscopic VR Box alignment
                this.ipd = 0.064; // Interpupillary distance setup
                this.cameraL = new THREE.PerspectiveCamera(60, (window.innerWidth / 2) / window.innerHeight, 0.1, 100);
                this.cameraR = new THREE.PerspectiveCamera(60, (window.innerWidth / 2) / window.innerHeight, 0.1, 100);
                
                this.scene = new THREE.Scene();
                
                // 2. Un-distorted panoramic horizontal camera plane
                this.bgScene = new THREE.Scene();
                this.bgCamera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);

                this.renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
                this.renderer.setPixelRatio(window.devicePixelRatio);
                this.renderer.setSize(window.innerWidth, window.innerHeight);
                this.renderer.autoClear = false;
                this.container.appendChild(this.renderer.domElement);

                this.spawnedObjects = [];
                this.currentColor = 0x00ffcc;

                this.initCameraStream();
                this.initSceneLighting();
                this.initVoiceRecognition();
                this.animate();

                window.addEventListener('resize', () => this.onWindowResize());
            }

            async initCameraStream() {
                try {
                    this.video = document.createElement('video');
                    this.video.autoplay = true;
                    this.video.playsInline = true;
                    
                    this.video.srcObject = await navigator.mediaDevices.getUserMedia({
                        video: { facingMode: 'environment', width: 1280, height: 720 }
                    });
                    this.video.play();

                    this.video.addEventListener('loadedmetadata', () => {
                        this.setupBackgroundPlane(new THREE.VideoTexture(this.video));
                    });
                } catch (e) {
                    console.warn("Camera blocked. Generating fallback simulation panel.");
                    this.setupBackgroundPlane(this.createFallbackTexture());
                }
            }

            setupBackgroundPlane(texture) {
                texture.minFilter = THREE.LinearFilter;
                const geometry = new THREE.PlaneGeometry(2, 2);
                const material = new THREE.MeshBasicMaterial({ map: texture, depthTest: false, depthWrite: false });
                this.bgMesh = new THREE.Mesh(geometry, material);
                this.bgScene.add(this.bgMesh);
                this.updateCameraAspect();
            }

            createFallbackTexture() {
                const canvas = document.createElement('canvas');
                canvas.width = 512; canvas.height = 512;
                const ctx = canvas.getContext('2d');
                ctx.fillStyle = '#15171e'; ctx.fillRect(0, 0, 512, 512);
                ctx.strokeStyle = '#252936';
                for(let i=0; i<512; i+=32) { ctx.strokeRect(i, 0, 32, 512); ctx.strokeRect(0, i, 512, 32); }
                return new THREE.CanvasTexture(canvas);
            }

            updateCameraAspect() {
                if (!this.bgMesh) return;
                const videoAspect = this.video ? (this.video.videoWidth / this.video.videoHeight) : (1280 / 720);
                const viewAspect = (window.innerWidth / 2) / window.innerHeight;

                if (viewAspect > videoAspect) {
                    this.bgMesh.scale.set(1, videoAspect / viewAspect, 1);
                } else {
                    this.bgMesh.scale.set(viewAspect / videoAspect, 1, 1);
                }
            }

            initSceneLighting() {
                const light = new THREE.DirectionalLight(0xffffff, 2.0);
                light.position.set(2, 4, 5);
                this.scene.add(light);
                this.scene.add(new THREE.AmbientLight(0x666666));
            }
